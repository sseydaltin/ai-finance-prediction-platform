name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bagımlılıkları kur
        run: pip install -r requirements.txt

      - name: Ruff kontrol
        run: ruff check src/ tests/

      - name: Pytest
        run: pytest tests/ -v
